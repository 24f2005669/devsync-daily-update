name: Daily Repo Update

on:
  schedule:
    - cron: '30 16 * * *'   # Runs once daily at fixed time (UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create or update activity file
        run: |
          echo "Last update: $(date)" > activity.log

      - name: Commit changes - 24f2005669@ds.study.iitm.ac.in
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "24f2005669@ds.study.iitm.ac.in"
          git add activity.log
          git commit -m "Automated daily update"
          git push
