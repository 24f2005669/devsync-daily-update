name: DevSync Daily Update

permissions:
  contents: write

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log and commit for 24f2005669@ds.study.iitm.ac.in
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "Automated update ran at: $(date)" >> automated_log.txt

          git add automated_log.txt
          git commit -m "Automated daily sync commit" || echo "Nothing to commit"
          git push
